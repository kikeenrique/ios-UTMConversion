name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (build & test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  linux:
    name: Linux (build & test)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v7
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  android:
    name: Android (cross-compile & test on emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build and test Swift package on Android
        uses: skiptools/swift-android-action@v2
        with:
          # Cross-compiles the package for Android and runs the XCTest suite
          # inside an Android emulator (run-tests defaults to true).
          swift-version: "6.1"
          free-disk-space: true
